<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="form.css">
    <link href="https://fonts.cdnfonts.com/css/norse" rel="stylesheet">
</head>
<body>
    <div id="grassImg">
        <img src="grass.jpg" alt="">

        <div class="Logo"> 
            <img src="Logo.png" alt="logo" id="logo">
            <div id="text">Odin</div>


             <div id="formContainer">
                <div id="space"></div>
                 <div id="paragraph">This is not a real online service! You know you need something
                                     like this in your life to help you realize your deepest dreams.
                                     Sign up now to get started.<br><br>
                                     You know you want to.</div><br><br>
                 <div id="formSection">
                    <div id="left"><br>
                        <div id="let">Let's do this!</div><br>
                        <form action="#" method="get">
                        <div>
                            <label for="firstName">FIRST NAME</label>
                            <input type="text" id="firstName" name="first_name" placeholder="Geoffrey ">
                        </div>
                        <div> <br>
                            <label for="email">EMAIL</label>
                              <input type="email" id="email" name="email" placeholder="you@example.com" >
                        </div>
                        <div> <br><br>
                            <label for="password">PASSWORD</label>
                            <input type="password" id="password" name="password"  minlength="5"  pattern="[A-Za-z]{5,}"  title="Password must be at least 5 letters">
                        </div>
                        </form>
                    </div>

                    <div id="right" >
                        <div id="let"></div><br><br>
                        <form action="#" method="get">
                         <div><br><br>
                             <label for="lastName">LAST NAME</label><br>
                            <input type="text" id="lastName" name="last_name" placeholder="Hinton">
                         </div>
                        <div> <br><br>
                            <label for="phone">PHONE NUMBER</label><br>
                            <input type="number" id="phone" name="phone_number" placeholder="+2519............" >
                        </div>
                        <div> <br>
                              <label for="password">CONFIRM PASSWORD</label><br>
                            <input type="password" id="password" name="password" minlength="5" pattern="[A-Za-z]{5,}"  title="Password must be at least 5 letters">
                        </div>
                        </form>
                    </div>

                 </div>
                 <div id="buttonSection">
                    <button type="submit" id="button">Create Account</button><br><br>
                    Already have an account? <a href="#">Log in</a>
                 </div>
         
       </form>
            </div>


        </div>
     
    </div>
</body>
</html>
